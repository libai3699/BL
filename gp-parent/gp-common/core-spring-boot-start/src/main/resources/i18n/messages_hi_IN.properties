7\u0902 \u0914\u0930 \u0915\u092E\u093E\u090F\u0902, \u0926\u094B\u0917\u0941\u0928\u0940 \u0909\u0924\u094D\u0924\u0947\u091C\u0928\u093E!\n\u0932\u0915\u0940 \u0935\u094D\u0939\u0940\u0932, \u092E\u093E\u0930\u094D\u092C\u0932\u094D\u0938, \u0907\u0932\u0947\u0915\u094D\u091F\u094D\u0930\u0949\u0928\u093F\u0915 \u0917\u0947\u092E\u094D\u0938, \u0935\u0940\u0921\u093F\u092F\u094B \u0917\u0947\u092E\u094D\u0938 \u0914\u0930 \u0905\u0927\u093F\u0915 \u0930\u093F\u0935\u0949\u0930\u094D\u0921\u094D\u0938, \u0926\u0948\u0928\u093F\u0915 \u0909\u0924\u094D\u0938\u0935, \u0926\u0948\u0928\u093F\u0915 \u091C\u0940\u0924!\n\n\u3010\u0932\u0949\u0928\u094D\u091A \u092C\u0947\u0928\u093F\u092B\u093F\u091F\u094D\u0938\u3011\n\uD83D\uDD39\u092B\u0930\u094D\u0938\u094D\u091F \u0921\u093F\u092A\u0949\u091C\u093F\u091F \u092C\u094B\u0928\u0938 10% - \u0928\u090F \u0916\u093F\u0932\u093E\u0921\u093C\u0940 \u0936\u0941\u0930\u0942 \u0915\u0930\u0947\u0902, \u0936\u0941\u0930\u0941\u0906\u0924 \u0938\u0947 \u091C\u0940\u0924\u0947\u0902!\n\uD83D\uDD39\u0926\u0948\u0928\u093F\u0915 \u0930\u093F\u091A\u093E\u0930\u094D\u091C \u0930\u093F\u092C\u0947\u091F 1% - \u0905\u0927\u093F\u0915 \u0921\u093F\u092A\u0949\u091C\u093F\u091F, \u0905\u0927\u093F\u0915 \u0915\u092E\u093E\u0908, \u0926\u0948\u0928\u093F\u0915 \u0906\u0936\u094D\u091A\u0930\u094D\u092F!\n\uD83D\uDD39\u092E\u093E\u0930\u094D\u092C\u0932\u094D\u0938/\u0935\u0940\u0921\u093F\u092F\u094B/\u0936\u0924\u0930\u0902\u091C/\u0907\u0932\u0947\u0915\u094D\u091F\u094D\u0930\u0949\u0928\u093F\u0915\n\u0926\u0948\u0928\u093F\u0915 \u0905\u0927\u093F\u0915\u0924\u092E \u092C\u094B\u0928\u0938 $5000, \u092C\u0947\u0928\u093F\u092B\u093F\u091F\u094D\u0938 \u092C\u0922\u093C \u0930\u0939\u0947 \u0939\u0948\u0902, \u0938\u094D\u0925\u093F\u0930 \u0915\u092E\u093E\u0908!\n\n\u3010\u0935\u093E\u092F\u0930\u0932\u0947\u0938 \u090F\u091C\u0947\u0902\u0938\u0940 \u092E\u0948\u0915\u0947\u0928\u093F\u091C\u094D\u092E\u3011\n\u0906\u092A\u0915\u0947 \u0926\u094D\u0935\u093E\u0930\u093E \u0906\u092E\u0902\u0924\u094D\u0930\u093F\u0924 \u0932\u094B\u0917, \u091A\u093E\u0939\u0947 \u0935\u0947 \u0915\u093F\u0924\u0928\u0947 \u092D\u0940 \u0938\u094D\u0924\u0930\u094B\u0902 \u0915\u0940 \u092D\u0930\u094D\u0924\u0940 \u0915\u0930\u0947\u0902,\n\u091C\u092C \u0924\u0915 \u0935\u0947 \u0921\u093F\u092A\u0949\u091C\u093F\u091F \u0915\u0930\u0924\u0947 \u0939\u0948\u0902 \u0914\u0930 \u091F\u0930\u094D\u0928\u0913\u0935\u0930 \u0909\u0924\u094D\u092A\u0928\u094D\u0928 \u0915\u0930\u0924\u0947 \u0939\u0948\u0902, \u0906\u092A\u0915\u094B \u0915\u092E\u0940\u0936\u0928 \u092E\u093F\u0932\u0924\u093E \u0939\u0948!\n\u0935\u093E\u0938\u094D\u0924\u0935\u093F\u0915 \u0909\u092A\u0932\u092C\u094D\u0927\u093F: \u090F\u0915 \u0935\u094D\u092F\u0915\u094D\u0924\u093F \u092A\u094D\u0930\u091A\u093E\u0930 \u0915\u0930\u0924\u093E \u0939\u0948, \u092A\u0942\u0930\u093E \u0928\u0947\u091F\u0935\u0930\u094D\u0915 \u0932\u093E\u092D\u093E\u0928\u094D\u0935\u093F\u0924 \u0939\u094B\u0924\u093E \u0939\u0948, \u0928\u093F\u0930\u0902\u0924\u0930 \u0906\u092F!\n\n\u0905\u092C \u0928\u0940\u091A\u0947 \u0926\u093F\u090F \u0917\u090F \u092C\u091F\u0928 \u092A\u0930 \u0915\u094D\u0932\u093F\u0915 \u0915\u0930\u0947\u0902 \u0907\u0938 \u092C\u094B\u0928\u0938 \u0938\u094D\u091F\u0949\u0930\u094D\u092E \u0915\u0940 \u0932\u0939\u0930 \u0915\u094B \u0938\u0941\u0930\u0915\u094D\u0937\u093F\u0924 \u0915\u0930\u0928\u0947 \u0915\u0947 \u0932\u093F\u090F!\n
