# Y\u00FCkleme
bot.index.aboutMpay=@Mpay c\u00FCzdan\u0131, Telegram sosyal medya yaz\u0131l\u0131m\u0131na dayanan sanal para \u00F6deme sistemidir.\nGeli\u015Ftirme ekibi, Birle\u015Fik Arap Emirlikleri'nin Dubai \u015Fehrindedir. En iyi k\u00FCresel geli\u015Ftirme ve hizmet ekibine ve blockchain g\u00FCvenlik uzmanlar\u0131na sahibiz. Kurulu\u015F, uluslararas\u0131 DEKRA a\u011F g\u00FCvenli\u011Fi kurulu\u015Funun FIPS 140-2 ve ISO 19790 g\u00FCvenlik sertifikalar\u0131na sahip olmu\u015Ftur. @Mpay, her zaman kullan\u0131c\u0131lar\u0131n varl\u0131k g\u00FCvenli\u011Fini \u00F6nemsemektedir.\n\n@Mpay c\u00FCzdan\u0131 sadece bir c\u00FCzdan de\u011Fil, ayn\u0131 zamanda Maskex borsas\u0131 ile birlikte geli\u015Ftirilen merkezi i\u015Flem sistemidir.\nT\u00FCm kullan\u0131c\u0131 varl\u0131klar\u0131 borsa hesaplar\u0131nda depolanacakt\u0131r.\nHer kullan\u0131c\u0131n\u0131n hesaplar\u0131 bir\u00E7ok kez \u015Fifrelenip do\u011Frulanacakt\u0131r.\nTelegram hesab\u0131n\u0131z\u0131 kaybetseniz bile, varl\u0131klar\u0131n\u0131za anahtar ve kimlik bilgileri ile geri eri\u015Febilirsiniz.\n\n@Mpay c\u00FCzdan\u0131nda, sadece y\u00FCkleme, para transferi, para \u00E7ekme, para birimi takas\u0131, telefon y\u00FCkleme, \u00FCyelik y\u00FCkleme gibi i\u015Flevleri ger\u00E7ekle\u015Ftirebilirsiniz. Ayr\u0131ca Telegram arkada\u015Flar\u0131n\u0131za para g\u00F6nderebilir, alabilir, vb. i\u015Flemleri de ger\u00E7ekle\u015Ftirebilirsiniz, hi\u00E7bir \u00FCcret yoktur.\nBunun yan\u0131 s\u0131ra @Mpay \u00FCzerinde bir i\u015Fletme a\u00E7arak kendi toplulu\u011Funuzun \u00F6deme i\u015Flevini tamamlayabilirsiniz.\n\n@Mpay ekibi herkese mutlu bir 2024 y\u0131l diler.
