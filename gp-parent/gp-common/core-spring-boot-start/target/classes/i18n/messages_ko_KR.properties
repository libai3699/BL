# \u5145\u503C
bot.index.aboutMpay=@Mpay\uC9C0\uAC11\uC740 Telegram \uC18C\uC15C \uC18C\uD504\uD2B8\uC6E8\uC5B4 \uAE30\uBC18\uC758 \uAC00\uC0C1 \uD654\uD3D0 \uACB0\uC81C \uC2DC\uC2A4\uD15C\uC785\uB2C8\uB2E4.\n\uAC1C\uBC1C\uD300\uC740 \uC544\uB78D\uC5D0\uBBF8\uB9AC\uD2B8 \uB450\uBC14\uC774\uC5D0 \uC704\uCE58\uD558\uACE0 \uC788\uC2B5\uB2C8\uB2E4. \uC6B0\uB9AC\uB294 \uC138\uACC4 \uCD5C\uACE0\uC758 \uAC1C\uBC1C \uBC0F \uC11C\uBE44\uC2A4 \uD300\uACFC \uBE14\uB85D\uCCB4\uC778 \uBCF4\uC548 \uC804\uBB38\uAC00\uB97C \uBCF4\uC720\uD558\uACE0 \uC788\uC2B5\uB2C8\uB2E4. \uADF8\uB4E4\uC740 \uAD6D\uC81C DEKRA \uB124\uD2B8\uC6CC\uD06C \uBCF4\uC548 \uAE30\uAD00\uC758 FIPS 140-2 \uBC0F ISO 19790 \uBCF4\uC548 \uC778\uC99D\uC744 \uD1B5\uACFC\uD588\uC2B5\uB2C8\uB2E4. @Mpay\uB294 \uD56D\uC0C1 \uC0AC\uC6A9\uC790\uC758 \uC790\uC0B0 \uC548\uC804\uC744 \uC911\uC694\uC2DC\uD569\uB2C8\uB2E4.\n\n@Mpay\uC9C0\uAC11\uC740 \uB2E8\uC21C\uD55C \uC9C0\uAC11\uC774 \uC544\uB2C8\uB77C, Maskex \uAC70\uB798\uC18C\uC640 \uACF5\uB3D9 \uAC1C\uBC1C\uD55C \uC911\uC559\uD654\uB41C \uAC70\uB798 \uC2DC\uC2A4\uD15C\uC785\uB2C8\uB2E4.\n\uC0AC\uC6A9\uC790\uC758 \uBAA8\uB4E0 \uC790\uC0B0\uC740 \uAC70\uB798\uC18C\uC758 \uACC4\uC815\uC5D0 \uC800\uC7A5\uB429\uB2C8\uB2E4.\n\uC6B0\uB9AC\uB294 \uAC01 \uC0AC\uC6A9\uC790\uC758 \uACC4\uC815\uC744 \uC5EC\uB7EC \uBC88 \uC554\uD638\uD654\uD558\uACE0 \uAC80\uC99D\uD569\uB2C8\uB2E4.\n\uC5EC\uB7EC\uBD84\uC758 Telegram \uACC4\uC815\uC774 \uC190\uC2E4\uB418\uB354\uB77C\uB3C4, \uD0A4\uC640 \uC778\uC99D \uC815\uBCF4\uB97C \uD1B5\uD574 \uC790\uC0B0\uC744 \uD68C\uC218\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.\n\n@Mpay\uC9C0\uAC11\uC5D0\uC11C\uB294 \uCDA9\uC804, \uC774\uCCB4, \uC778\uCD9C, \uD654\uD3D0 \uAD50\uD658, \uD1B5\uC2E0 \uC694\uAE08 \uCDA9\uC804, \uD68C\uC6D0 \uCDA9\uC804 \uB4F1\uC758 \uAE30\uB2A5\uBFD0\uB9CC \uC544\uB2C8\uB77C Telegram \uCE5C\uAD6C\uC5D0\uAC8C \uB808\uB4DC \uD328\uD0B7\uC744 \uBCF4\uB0B4\uAC70\uB098 \uC774\uCCB4, \uC218\uAE08 \uB4F1\uC758 \uAE30\uB2A5\uB3C4 \uC81C\uACF5\uD558\uBA70, \uC5B4\uB5A0\uD55C \uC218\uC218\uB8CC\uB3C4 \uD544\uC694\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.\n\uC5EC\uB7EC\uBD84\uC740 @Mpay\uC5D0\uC11C \uC0C1\uC778\uC744 \uAC1C\uC124\uD558\uC5EC \uC790\uC2E0\uC758 \uCEE4\uBBA4\uB2C8\uD2F0 \uACB0\uC81C \uAE30\uB2A5\uC744 \uC644\uC131\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.\n\n@Mpay \uC804\uCCB4 \uBA64\uBC84\uAC00 \uC5EC\uB7EC\uBD84\uC5D0\uAC8C 2024\uB144 \uC0C8\uD574 \uBCF5 \uB9CE\uC774 \uBC1B\uC73C\uC2DC\uAE38 \uBC14\uB78D\uB2C8\uB2E4.
