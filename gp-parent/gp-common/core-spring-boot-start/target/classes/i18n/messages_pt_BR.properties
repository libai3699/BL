bot.index.aboutMpay=@Mpay wallet \u00E9 um sistema de pagamento em moeda virtual baseado no software social Telegram. \nA equipe de desenvolvimento est\u00E1 localizada em Dubai, Emirados \u00C1rabes. Temos as melhores equipes de desenvolvimento e servi\u00E7os do mundo, bem como especialistas em seguran\u00E7a de blockchain. Eles s\u00E3o certificados em seguran\u00E7a FIPS 140-2 e ISO 19790 pela ag\u00EAncia internacional de seguran\u00E7a cibern\u00E9tica DEKRA. @Mpay sempre se preocupa com a seguran\u00E7a dos ativos do usu\u00E1rio. \n\n@A carteira Mpay n\u00E3o \u00E9 apenas uma carteira, \u00E9 um sistema de negocia\u00E7\u00E3o centralizado desenvolvido em conjunto com a bolsa Maskex. \nTodos os ativos do usu\u00E1rio ser\u00E3o armazenados na conta da exchange. \nCriptografaremos e verificaremos a conta de cada usu\u00E1rio diversas vezes. \nMesmo que sua conta do Telegram seja perdida, voc\u00EA ainda poder\u00E1 recuperar seus ativos por meio da chave e das informa\u00E7\u00F5es de autentica\u00E7\u00E3o. \n\nNa carteira @Mpay, voc\u00EA n\u00E3o pode apenas realizar recarga, transfer\u00EAncia, retirada de moeda, c\u00E2mbio, recarga de conta telef\u00F4nica, recarga de assinatura e outras fun\u00E7\u00F5es. Voc\u00EA tamb\u00E9m pode enviar envelopes vermelhos para amigos do Telegram, transferir dinheiro, receber dinheiro e outras fun\u00E7\u00F5es sem nenhuma taxa. \nVoc\u00EA pode at\u00E9 abrir um comerciante no @Mpay para completar a fun\u00E7\u00E3o de pagamento da sua pr\u00F3pria comunidade. \n\nTodos os membros do @Mpay desejam a todos: Feliz Ano Novo 2024.
