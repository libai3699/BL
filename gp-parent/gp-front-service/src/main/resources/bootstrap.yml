server:
  port: 13004
  undertow:
    buffer-size: 1024

spring:
  application:
    name: @artifactId@
  profiles:
    active: @profiles.active@
  main:
    allow-bean-definition-overriding: true
  cloud:
    sentinel:
      transport:
        dashboard: @profiles.sentinel@
        port: 8719
    nacos:
      discovery:
        server-addr: @profiles.nacosAddr@
        namespace: @profiles.namespace@
        group: DEFAULT_GROUP
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        namespace: @profiles.namespace@
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - dataId: application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
            refresh: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=50000,expireAfterWrite=5m

# Sa-Token 前台权限
sa-token:
  token-name: token
  timeout: 604800
  auto-renew: true
  activity-timeout: -1
  is-concurrent: false
  is-share: false
  token-style: simple-uuid
  is-log: true
  is-read-head: true
  is-read-cookie: false
  is-read-body: false

swagger:
  pathMapping: /
