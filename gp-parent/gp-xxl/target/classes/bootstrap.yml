server:
  port: 13005
  undertow:
    buffer-size: 1024

spring:
  application:
    name: gp-xxl
  profiles:
    active: local
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: 
        namespace: 
        group: DEFAULT_GROUP
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        namespace: 
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - dataId: application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
            refresh: true
